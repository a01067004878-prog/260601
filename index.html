<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물 MBTI 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

```
<!-- 시작 화면 -->
<section id="home" class="card">
    <div class="hero-emoji">🐾</div>
    <h1>동물 MBTI 테스트</h1>
    <p>
        몇 가지 질문에 답하고<br>
        당신과 가장 닮은 동물을 찾아보세요.
    </p>

    <button id="startBtn" class="primary-btn">
        테스트 시작하기
    </button>
</section>

<!-- 질문 화면 -->
<section id="questionContainer" class="card hidden">

    <div id="progress" class="progress"></div>

    <h2 id="question"></h2>

    <button id="answerA" class="answer-btn"></button>

    <button id="answerB" class="answer-btn"></button>

</section>

<!-- 결과 화면 -->
<section id="resultContainer" class="card hidden">

    <div id="animalEmoji" class="result-emoji"></div>

    <h2 id="mbtiType"></h2>

    <h1 id="animalName"></h1>

    <p id="description"></p>

    <button id="restartBtn" class="primary-btn">
        다시 테스트하기
    </button>

</section>
```

</div>

<script src="app.js"></script>

</body>
</html>
